name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bank-app
  # This helps suppress Node warnings on newer runners
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  # 1. BUILD JOB
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Upload the entire target folder (classes for Sonar, JAR for Docker)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: target/

  # 2. SONARQUBE SCAN
  sonarqube:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: target/

      - name: Set up JDK 17
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=bank-app \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.java.binaries=target/classes

  # 3. DOCKER BUILD & PUSH
  docker-build-push:
    runs-on: self-hosted
    needs: sonarqube
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # 4. TRIVY SCAN
  trivy-scan:
    runs-on: self-hosted
    needs: docker-build-push
    steps:
      - name: Trivy Image Scan
        run: |
          # Use Docker to run Trivy so you don't have to install it manually every time
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            ${{ env.IMAGE_NAME }}:latest

  # 5. UPDATE K8S MANIFEST
  update-manifest:
    runs-on: self-hosted
    needs: trivy-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2
        with:
          # You need a Personal Access Token (PAT) if you want to trigger another 
          # workflow (like ArgoCD sync) upon pushing back to the repo.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tag
        run: |
          sed -i "s|image: .*bank-app.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/bankapp-deployment.yml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bankapp-deployment.yml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push