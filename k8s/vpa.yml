apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bankapp-vpa
  namespace: bankapp
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bankapp
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: bankapp
        minAllowed:
          cpu: "250m"
          memory: "512Mi"
        maxAllowed:
          cpu: "1"
          memory: "2Gi"