name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bank-app

jobs:
  # ─────────────────────────────
  # JOB 1: BUILD
  # ─────────────────────────────
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: app-jar
          path: target/*.jar

  # ─────────────────────────────
  # JOB 2: SONARQUBE SCAN
  # ─────────────────────────────
  sonarqube:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download JAR
        uses: actions/download-artifact@v3
        with:
          name: app-jar
          path: target

      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=bank-app \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────
  # JOB 3: DOCKER BUILD & PUSH
  # ─────────────────────────────
  docker-build-push:
    runs-on: self-hosted
    needs: sonarqube
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────
  # JOB 4: TRIVY SCAN
  # ─────────────────────────────
  trivy-scan:
    runs-on: self-hosted
    needs: docker-build-push
    steps:
      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy Image Scan
        run: |
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format table \
            ${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────
  # JOB 5: UPDATE K8S MANIFEST
  # ─────────────────────────────
  update-manifest:
    runs-on: self-hosted
    needs: trivy-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tag
        run: |
          sed -i "s|image: .*bank-app.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/bankapp-deployment.yml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bankapp-deployment.yml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
